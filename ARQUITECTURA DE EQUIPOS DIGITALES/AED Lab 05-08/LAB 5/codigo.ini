#include <Servo.h>

const int JOYX   = A0;  // Eje horizontal
const int JOYY   = A1;  // Eje vertical
const int JOYBTN = 4;   // Botón pulsador

const int SERVOX = 9;   // Servo eje X
const int SERVOY = 10;  // Servo eje Y

Servo servoX, servoY;

void setup() {
  servoX.attach(SERVOX);
  servoY.attach(SERVOY);
  pinMode(JOYBTN, INPUT_PULLUP);
  Serial.begin(9600);
  Serial.println("JoyX,JoyY,AngX,AngY,BTN");
}

void loop() {
  int jx  = analogRead(JOYX);
  int jy  = analogRead(JOYY);
  int btn = digitalRead(JOYBTN);

  // Zona muerta en el centro (evita vibración)
  int jxAdj = (abs(jx - 512) < 30) ? 512 : jx;
  int jyAdj = (abs(jy - 512) < 30) ? 512 : jy;

  // Mapear 0–1023 a 0–180 grados
  int angX = map(jxAdj, 0, 1023, 0, 180);
  int angY = map(jyAdj, 0, 1023, 0, 180);

  servoX.write(angX);
  servoY.write(angY);

  // Botón presionado: centrar ambos servos
  if (btn == LOW) {
    servoX.write(90);
    servoY.write(90);
    Serial.println("Servos centrados");
  }

  Serial.print(jx);   Serial.print(",");
  Serial.print(jy);   Serial.print(",");
  Serial.print(angX); Serial.print(",");
  Serial.print(angY); Serial.print(",");
  Serial.println(btn);

  delay(50);
}